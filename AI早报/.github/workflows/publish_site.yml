name: Publish Site

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "README.md"
      - "BACKUP/**"
      - "site/**"
      - "config/**"
      - "src/ai_daily/render/**"
      - "src/ai_daily/models/publication.py"
      - "src/ai_daily/pipeline/assets.py"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Verify generated assets
        run: |
          test -f README.md
          test -f site/generated/index.html
          test -f site/generated/rss.xml
          test -f site/generated/custom.css
          test -f site/generated/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/generated

  deploy:
    if: github.actor != 'github-actions[bot]'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
