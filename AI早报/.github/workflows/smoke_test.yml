name: Smoke Test

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"

jobs:
  test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          pytest

