name: Generate Draft

on:
  workflow_dispatch:
  issues:
    types: [labeled]

permissions:
  contents: write

concurrency:
  group: generate-draft
  cancel-in-progress: false

jobs:
  draft:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       github.event.label.name == 'trigger-draft' &&
       github.actor != 'github-actions[bot]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AI早报
    env:
      PYTHONPATH: src
      AI_DAILY_GITHUB_REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AI_DAILY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_MODEL: Qwen2.5-72B-Instruct
      LLM_BASE_URL: https://api.edgefn.net/v1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Bootstrap DB
        run: ai-daily init-db
      - name: Classify candidates
        run: ai-daily classify
      - name: Generate draft
        id: draft
        run: |
          report_date="$(date +%F)"
          ai-daily draft --date "$report_date"
          echo "report_date=$report_date" >> "$GITHUB_OUTPUT"
      - name: Upload draft artifact
        uses: actions/upload-artifact@v4
        with:
          name: draft-${{ steps.draft.outputs.report_date }}
          path: AI早报/data/staging/draft_${{ steps.draft.outputs.report_date }}.md
      - name: Commit draft and database
        run: |
          draft_path="data/staging/draft_${{ steps.draft.outputs.report_date }}.md"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/ai_daily.db
          git add "$draft_path"
          if git diff --cached --quiet -- data/ai_daily.db "$draft_path"; then
            echo "No draft changes to commit"
            exit 0
          fi
          git commit -m "chore: generate draft ${{ steps.draft.outputs.report_date }} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
