name: Fetch Candidates

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: fetch-candidates
  cancel-in-progress: false

jobs:
  fetch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AI早报
    env:
      PYTHONPATH: src
      AI_DAILY_GITHUB_REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AI_DAILY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Bootstrap DB
        run: |
          ai-daily init-db
          ai-daily seed-sources
      - name: Fetch candidates
        run: ai-daily fetch --source-type all
      - name: Dedupe candidates
        run: ai-daily dedupe
      - name: Score candidates
        run: ai-daily score
      - name: Commit database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/ai_daily.db
          if git diff --cached --quiet -- data/ai_daily.db; then
            echo "No database changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh candidates [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
