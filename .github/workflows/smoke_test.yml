name: Smoke Test

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "AI早报/src/**"
      - "AI早报/tests/**"
      - "AI早报/pyproject.toml"

jobs:
  test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AI早报
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          pytest
