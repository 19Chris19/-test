name: Generate Video

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number for video rendering"
        required: false
        default: "1"
      plan_path:
        description: "Optional plan path (relative to repo root)"
        required: false
      frames_dir:
        description: "Optional frames directory (relative to repo root)"
        required: false
      auto_tts:
        description: "Run online TTS and align timeline before rendering"
        type: boolean
        required: true
        default: true

permissions:
  contents: read

concurrency:
  group: generate-video-${{ github.ref }}
  cancel-in-progress: false

jobs:
  render-video:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: AI早报
    env:
      PYTHONPATH: src
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ vars.LLM_BASE_URL || 'https://api.edgefn.net/v1' }}
      TTS_MODEL: ${{ vars.TTS_MODEL || 'FunAudioLLM/CosyVoice2-0.5B' }}
      TTS_API_KEY: ${{ secrets.TTS_API_KEY }}
      TTS_BASE_URL: ${{ vars.TTS_BASE_URL || vars.LLM_BASE_URL || 'https://api.edgefn.net/v1' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install imageio-ffmpeg

      - name: Resolve run parameters
        id: params
        shell: bash
        run: |
          set -euo pipefail
          issue_number="${{ github.event.inputs.issue_number }}"
          if [ -z "$issue_number" ]; then
            issue_number="1"
          fi
          output_dir="services/video-maker/output/issue_${issue_number}"
          mkdir -p "$output_dir"

          plan_path="${{ github.event.inputs.plan_path }}"
          if [ -z "$plan_path" ]; then
            plan_path="data/video_plan_${issue_number}.json"
            ai-daily build-video-plan --issue-number "$issue_number" > "$plan_path"
          fi

          frames_dir="${{ github.event.inputs.frames_dir }}"
          if [ -z "$frames_dir" ]; then
            frames_dir="${output_dir}/frames"
          fi
          mkdir -p "$frames_dir"

          has_frames="$(find "$frames_dir" -maxdepth 1 -type f \( -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.webp' \) | head -n 1)"
          if [ -z "$has_frames" ]; then
            card_path="site/static/cards/issue_${issue_number}.png"
            if [ -f "$card_path" ]; then
              cp "$card_path" "${frames_dir}/default.png"
            fi
          fi

          has_frames="$(find "$frames_dir" -maxdepth 1 -type f \( -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.webp' \) | head -n 1)"
          if [ -z "$has_frames" ]; then
            echo "No frame images found in ${frames_dir}."
            echo "Provide --frames-dir or pre-generate card assets under site/static/cards/."
            exit 1
          fi

          tts_base_url="${TTS_BASE_URL:-${LLM_BASE_URL:-https://api.edgefn.net/v1}}"

          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "plan_path=$plan_path" >> "$GITHUB_OUTPUT"
          echo "frames_dir=$frames_dir" >> "$GITHUB_OUTPUT"
          echo "output_dir=$output_dir" >> "$GITHUB_OUTPUT"
          echo "video_path=${output_dir}/issue_${issue_number}.mp4" >> "$GITHUB_OUTPUT"
          echo "tts_base_url=$tts_base_url" >> "$GITHUB_OUTPUT"

      - name: Validate TTS settings
        if: ${{ github.event.inputs.auto_tts == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TTS_MODEL:-}" ]; then
            echo "Missing TTS model. Set vars.TTS_MODEL."
            exit 1
          fi
          if [ -z "${TTS_API_KEY:-}" ] && [ -z "${LLM_API_KEY:-}" ]; then
            echo "Missing TTS API key. Set secrets.TTS_API_KEY or secrets.LLM_API_KEY."
            exit 1
          fi

      - name: Render video (isolated heavy job)
        shell: bash
        run: |
          set -euo pipefail
          base_cmd=(python services/video-maker/video_maker.py render)
          base_cmd+=(--plan "${{ steps.params.outputs.plan_path }}")
          base_cmd+=(--frames-dir "${{ steps.params.outputs.frames_dir }}")
          base_cmd+=(--output "${{ steps.params.outputs.video_path }}")
          if [ "${{ github.event.inputs.auto_tts }}" = "true" ]; then
            tts_key_env="LLM_API_KEY"
            if [ -n "${TTS_API_KEY:-}" ]; then
              tts_key_env="TTS_API_KEY"
            fi
            cmd=("${base_cmd[@]}")
            cmd+=(
              --auto-tts
              --tts-output-dir "${{ steps.params.outputs.output_dir }}/tts"
              --tts-base-url "${{ steps.params.outputs.tts_base_url }}"
              --tts-model "${TTS_MODEL}"
              --tts-api-key-env "${tts_key_env}"
            )
            if ! "${cmd[@]}"; then
              echo "Auto-TTS failed. Falling back to silent narration for CI continuity."
              fallback_audio="${{ steps.params.outputs.output_dir }}/narration.fallback.wav"
              python - <<'PY' "${{ steps.params.outputs.plan_path }}" "${fallback_audio}"
import json
import math
import sys
import wave
from pathlib import Path

plan_path = Path(sys.argv[1])
audio_path = Path(sys.argv[2])
payload = json.loads(plan_path.read_text(encoding="utf-8"))
timeline = payload.get("timeline", [])
duration = 0.0
for item in timeline:
    if isinstance(item, dict):
        duration += float(item.get("duration_seconds", 0.0) or 0.0)
duration = max(duration, 5.0)

audio_path.parent.mkdir(parents=True, exist_ok=True)
sample_rate = 16000
total_samples = int(math.ceil(duration * sample_rate))
chunk_samples = sample_rate
with wave.open(str(audio_path), "wb") as handle:
    handle.setnchannels(1)
    handle.setsampwidth(2)
    handle.setframerate(sample_rate)
    while total_samples > 0:
        current = min(total_samples, chunk_samples)
        handle.writeframes(b"\x00\x00" * current)
        total_samples -= current
PY
              fallback_cmd=("${base_cmd[@]}")
              fallback_cmd+=(--audio "${fallback_audio}")
              "${fallback_cmd[@]}"
            fi
          else
            if [ ! -f "${{ steps.params.outputs.output_dir }}/narration.wav" ]; then
              echo "Missing narration.wav and auto_tts=false"
              exit 1
            fi
            cmd=("${base_cmd[@]}")
            cmd+=(--audio "${{ steps.params.outputs.output_dir }}/narration.wav")
            "${cmd[@]}"
          fi

      - name: Upload video artifacts (no git commit)
        uses: actions/upload-artifact@v4
        with:
          name: video-issue-${{ steps.params.outputs.issue_number }}
          path: |
            AI早报/${{ steps.params.outputs.video_path }}
            AI早报/${{ steps.params.outputs.output_dir }}/*.ffconcat
            AI早报/${{ steps.params.outputs.output_dir }}/tts/**
            AI早报/${{ steps.params.outputs.plan_path }}
          if-no-files-found: warn
