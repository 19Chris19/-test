name: Publish Site

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "AI早报/README.md"
      - "AI早报/BACKUP/**"
      - "AI早报/site/**"
      - "AI早报/config/**"
      - "AI早报/src/ai_daily/render/**"
      - "AI早报/src/ai_daily/models/publication.py"
      - "AI早报/src/ai_daily/pipeline/assets.py"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AI早报
    env:
      PYTHONPATH: src
      AI_DAILY_GITHUB_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Generate site assets
        run: ai-daily generate-assets
      - uses: actions/configure-pages@v5
      - name: Verify generated assets
        run: |
          test -f README.md
          test -f site/generated/index.html
          test -f site/generated/rss.xml
          test -f site/generated/custom.css
          test -f site/generated/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: AI早报/site/generated

  deploy:
    if: github.actor != 'github-actions[bot]'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
